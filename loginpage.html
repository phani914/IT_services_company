<!DOCTYPE html>
<html>
    <head>
        <title>login page</title>
        <style>
            * {
                margin: 0;
                padding:0;
                box-sizing: border-box
            }
            .login-logo{
                padding-left: 70px;;
            }
            

            body {
                font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
                background: linear-gradient(rgba(102, 126, 234, 0.6), rgba(118, 75, 162, 0.6));
                background-attachment: fixed;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 20px;

            }

            .login-box {
                background-color: rgba(255, 255, 255, 0.85);
                padding: 40px;
                border-radius: 15px;
                box-shadow: 0 20px 40px rgba(0,0,0,0.2);
                width:100%;
                max-width:380px;

                h2 {
                    text-align: center;
                    color:#764ba2;
                    margin-bottom: 30px;
                    font-size: 30px;
                }

                .input-field {
                    width:100%;
                    padding: 15px;
                    margin-bottom: 20px;
                    border: 2px solid #e0e0e0;
                    border-radius: 8px;
                    font-size: 15px;
                    outline: none;
                    transition: all 0.5s ease;
                }

                .input-field:focus {
                    border-color: black;
                    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
                }

                .login-btn {
                    width: 70px;
                    padding:15px;
                    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                    color:white;
                    border: none;
                    border-radius: 8px;
                    font-size: 16px;
                    font-weight: 600;
                    cursor: pointer;
                    display: block;
                    margin: 0 auto;
         }

            }
        </style>
    </head>
    <body>
        <div class="login-box">
            <img src="C:\Users\ADMIN\Documents\itservices.html\logo1.jpg" alt="logo" class="login-logo">
        <h2>Login page</h2>
        <form id="loginForm">
        <input type="text" id="username" class="input-field" placeholder="username" required> </br>

        <input type="password" id="password" class="input-field" placeholder="password" required> </br>

        <button type="submit" class="login-btn">Login</button>
          <script>
          document.getElementById('loginForm').addEventListener('submit' , function(e){
            e.preventDefault();

            let username= document.getElementById('username').value;

            let password= document.getElementById('password').value;

            if (username === "" || password === "") {
                alert("please fill all credentials");}
              
                else {
                    alert("logged in successfully"); }

                document.getElementById('loginForm').reset();
             } );
            
          </script>
        </form>
        </div>
    </body>
</html>
