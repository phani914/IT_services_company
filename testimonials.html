<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name=""viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimonials</title>
    <link rel="stylesheet">
    <link rel="stylesheet" href="testimonials.css">
</head>

<body>
    <h1>Micro InfoWeb</h1>
    <h2>Feedback Form</h2>
    <h3>Please Take a Moment to Share Your Experience</h3>

    <div class="form-box">
        <div class="textup">
            <h3>We Value Your Feedback</h3>
        </div>

        <form>
            <label for="UserName">
                <i class="fa fa-solid fa-user"></i>
                UserName:
            </label>
            <input type="text" id="UserName" Name="UserName" required>

            <label for="E-Mail">
            <i class="fa fa-solid fa-envelope"></i>
            E-Mail Address:
            </label>

            <input type="E-Mail" id="E-Mail" Name="E-Mail" required>

            <label for="Phone">
                <i class="fa-solid fa-phone"></i>
                Phone No:
           </label>
            <input type="tel" id="Phone" Name="Phone" required>

            <label>
                <i class="fa-solid fa-face-smile"></i>
                Do You Satisfy With Our Services?
            </label>

            <div class="radio-group">
                <input type="radio" id="yes"
                       name="satisfy" value="Yes" checked>
                <label for="Yes">Yes</label>

                <input type="radio" id="no"
                       name="satisfy" value="no">
                <label for="No">No</label>
            </div>

            <label for="Msg">
                <i class="fa=solid fa-comments" style="margin-right: 3px;"></i>
                Write Your Suggestions:
            </label>
            <textarea id="Msg" Name="Msg" rows="4" cols="10" required>
            </textarea>
            
            <button type="Submit">
                Submit
            </button>
        </form>
    </div>
</body>
</html>
